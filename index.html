<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .timer {
            font-size: 5rem;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        .modes {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .mode-btn {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .mode-btn:hover {
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-start {
            background: #667eea;
            color: white;
            padding: 15px 50px;
            font-size: 1.2rem;
            flex: 1;
            min-width: 120px;
        }

        .btn-start:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-small {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
        }

        .btn-small:hover {
            background: #e0e0e0;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.5s linear;
        }

        .cycle {
            color: #999;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 Pomodoro</h1>

        <div class="modes">
            <button class="mode-btn active" data-mode="pomodoro">Trabajo (25m)</button>
            <button class="mode-btn" data-mode="short">Descanso (5m)</button>
            <button class="mode-btn" data-mode="long">Largo (15m)</button>
        </div>

        <div class="timer" id="timer">25:00</div>

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="play">START</button>
            <button class="btn btn-small" id="reset">RESET</button>
        </div>

        <div class="cycle">Ciclo: <span id="cycle">1</span></div>
    </div>

    <audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const timerEl = document.getElementById('timer');
        const barEl = document.getElementById('bar');
        const playBtn = document.getElementById('play');
        const resetBtn = document.getElementById('reset');
        const cycleEl = document.getElementById('cycle');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const sound = document.getElementById('sound');

        let timer = null;
        let isRunning = false;
        let timeLeft = 1500; // 25 minutos
        let totalTime = 1500;
        let currentMode = 'pomodoro';
        let cycles = 1;

        const times = {
            pomodoro: 25 * 60,
            short: 5 * 60,
            long: 15 * 60
        };

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            barEl.style.width = `${((totalTime - timeLeft) / totalTime) * 100}%`;
        }

        function play() {
            if (isRunning) {
                clearInterval(timer);
                playBtn.textContent = 'REANUDAR';
            } else {
                timer = setInterval(() => {
                    timeLeft--;
                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        sound.play().catch(() => {});
                        switchMode(currentMode === 'pomodoro' 
                            ? (cycles % 4 === 0 ? 'long' : 'short') 
                            : 'pomodoro');
                        if (currentMode === 'pomodoro') {
                            cycles++;
                            cycleEl.textContent = cycles;
                        }
                    }
                }, 1000);
                playBtn.textContent = 'PAUSA';
            }
            isRunning = !isRunning;
        }

        function reset() {
            clearInterval(timer);
            isRunning = false;
            timeLeft = times[currentMode];
            totalTime = timeLeft;
            playBtn.textContent = 'START';
            updateDisplay();
        }

        function switchMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            reset();
        }

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => switchMode(btn.dataset.mode));
        });

        playBtn.addEventListener('click', play);
        resetBtn.addEventListener('click', reset);

        updateDisplay();
    </script>
</body>
</html>
